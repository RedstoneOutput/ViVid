        async function handleSearch() {
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            const searchRow = document.getElementById('search-results-row');
            const searchGrid = document.getElementById('search-results-grid');
            
            if (query === "") {
                searchRow.style.display = 'none';
                document.querySelectorAll('.row:not(#search-results-row)').forEach(row => row.style.display = 'block');
                return;
            }

            document.querySelectorAll('.row:not(#search-results-row)').forEach(row => row.style.display = 'none');
            searchRow.style.display = 'block';


            let existingMatches = movieData.filter(m => m.name.toLowerCase().includes(query));


            let remoteMatches = [];
            if (query.length > 2) {
                try {

                    const apiKey = 'e99d0f46955efb8bf445665f96ff6a3c';
                    const response = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    remoteMatches = data.results
                        .filter(res => res.media_type === 'movie' || res.media_type === 'tv')
                        .map(res => ({
                            name: res.title || res.name,
                            genre: 'Global Discovery',
                            source: `https://player.videasy.net/${res.media_type}/${res.id}${res.media_type === 'tv' ? '/1/1' : ''}`,
                            poster: res.backdrop_path ? `https://image.tmdb.org/t/p/w500${res.backdrop_path}` : `https://placehold.co/280x158/1e1e24/6366f1?text=${(res.title || res.name).replace(/ /g, '+')}`
                        }));
                } catch (err) {
                    console.error("Remote pull failed. Reverting to local search.", err);
                }
            }


            const combined = [...existingMatches, ...remoteMatches];
            searchGrid.innerHTML = combined.map(movie => createCardHTML(movie)).join('');
        }


        let activeGenres = new Set();
        function filterGenre(genre, btn) {
            const allBtn = document.querySelector('.filter-btn[onclick*="\'All\'"]');
            if (genre === 'All') {
                activeGenres.clear();
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
            } else {
                allBtn.classList.remove('active');
                if (activeGenres.has(genre)) {
                    activeGenres.delete(genre);
                    btn.classList.remove('active');
                } else {
                    activeGenres.add(genre);
                    btn.classList.add('active');
                }

                if (activeGenres.size === 0) {
                    allBtn.classList.add('active');
                }
            }

            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const movieGenre = card.getAttribute('data-genre');
                if (activeGenres.size === 0 || activeGenres.has(movieGenre)) {
                    card.style.display = 'block';
                } else {
                 
                    card.style.display = 'none';
                }
            });
        }


        function renderAllRows() {
            const container = document.getElementById('content-rows');
            

            const recRow = document.getElementById('recommendation-row');
            const searchRow = document.getElementById('search-results-row');
            container.innerHTML = '';
            container.appendChild(recRow);
            container.appendChild(searchRow);


            const genres = [...new Set(movieData.map(m => m.genre))];


            renderTrendingRow(container);


            genres.forEach(genre => {
                const row = document.createElement('div');
                row.className = 'row';
                
                const title = document.createElement('h2');
                title.innerText = genre + " Collection";
                
                const thumbs = document.createElement('div');
                thumbs.className = 'thumbnails';
                
                const moviesInGenre = movieData.filter(m => m.genre === genre);
                thumbs.innerHTML = moviesInGenre.map(movie => createCardHTML(movie)).join('');
                
                row.appendChild(title);
                row.appendChild(thumbs);
                container.appendChild(row);
            });
        }

        function renderTrendingRow(container) {
            const row = document.createElement('div');
            row.className = 'row';
            row.id = 'trending-row';
            
            const title = document.createElement('h2');
            title.id = 'trending-title';
            title.innerText = "Trending Now";
            
            const thumbs = document.createElement('div');
            thumbs.className = 'thumbnails';
            thumbs.id = 'trending-grid';
            

            thumbs.innerHTML = movieData.map(movie => createCardHTML(movie)).join('');
            
            row.appendChild(title);
            row.appendChild(thumbs);
            container.appendChild(row);
        }

        function createCardHTML(movie) {

            return `
                <div class="card" data-name="${movie.name}" data-genre="${movie.genre}" onclick='openDynamicPlayer(${JSON.stringify(movie).replace(/'/g, "&apos;")})'>
                    <div class="watchlist-add" onclick="event.stopPropagation(); addToWatchlist('${movie.name}')">+</div>
                    <img src="${movie.poster}" alt="${movie.name}">
                </div>
            `;
        }


        let userPreferences = JSON.parse(localStorage.getItem('vividPrefs')) ||
[];

        function trackPreference(genre) {
            userPreferences.push(genre);

            if(userPreferences.length > 20) userPreferences.shift();
            localStorage.setItem('vividPrefs', JSON.stringify(userPreferences));
            renderRecommendations();
        }

        function getTopGenre() {
            if (userPreferences.length === 0) return null;
            const counts = {};
            userPreferences.forEach(g => counts[g] = (counts[g] || 0) + 1);
            return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        }

        function renderRecommendations() {
            const topGenre = getTopGenre();
            const recRow = document.getElementById('recommendation-row');
            const recGrid = document.getElementById('recommendation-grid');

            if (!topGenre) {
                recRow.style.display = 'none';
                return;
            }


            const recommendations = movieData.filter(m => m.genre === topGenre && !myWatchlist.includes(m.name));
            if (recommendations.length > 0) {
                recRow.style.display = 'block';
                recGrid.innerHTML = recommendations.map(movie => createCardHTML(movie)).join('');
            } else {
                recRow.style.display = 'none';
            }
        }



        let myWatchlist = JSON.parse(localStorage.getItem('vividWatchlist')) ||
[];

        async function addToWatchlist(movieName) {
            if(!myWatchlist.includes(movieName)) {

                myWatchlist.push(movieName);
                localStorage.setItem('vividWatchlist', JSON.stringify(myWatchlist));
                

                const movie = movieData.find(m => m.name === movieName);
                if(movie) trackPreference(movie.genre);

                try {
                    await databases.createDocument(DB_ID, COL_ID, ID.unique(), { movieName: movieName });
                    console.log("Sync Success: Movie added to Appwrite.");
                } catch (error) {
                    console.error("Cloud save failed. Using local storage.", error);
                }
                
                alert(movieName + " added!");
                renderWatchlist();
                renderRecommendations();
            } else {
                alert("Already in your list!");
            }
        }

        function addManualMovie() {
            const input = document.getElementById('manual-movie-input');
            const name = input.value.trim();
            if (name) {
                addToWatchlist(name);
                input.value = '';
                renderWatchlist();
            }
        }

        async function removeFromWatchlist(movieName) {

            myWatchlist = myWatchlist.filter(m => m !== movieName);
            localStorage.setItem('vividWatchlist', JSON.stringify(myWatchlist));


            try {
                const response = await databases.listDocuments(DB_ID, COL_ID, [Query.equal('movieName', movieName)]);
                if (response.documents.length > 0) {
                    await databases.deleteDocument(DB_ID, COL_ID, response.documents[0].$id);
                }
            } catch (e) {
                console.error("Cloud removal failed. Check permissions.", e);
            }
            renderWatchlist();
            renderRecommendations();
        }


        function openDynamicPlayer(movieObj) {
            openPlayer(movieObj.name, movieObj.source);
        }

        function openPlayer(name, customSource = null) {
            const movie = movieData.find(m => m.name === name);
            if(movie) trackPreference(movie.genre);
            
            let source = customSource || (movie && movie.source) || `https://player.videasy.net/movie/${name.replace(/ /g, '-')}`;
            
            if(source.includes('videasy.net')) {
                const separator = source.includes('?') ? '&' : '?';
                const params = ["color=8B5CF6", "nextEpisode=true", "autoplayNextEpisode=true", "episodeSelector=true", "overlay=true"].join('&');
                source += separator + params; 
            }

            const newWindow = window.open('about:blank', '_blank');
            if (newWindow) {
                newWindow.document.write(`
                    <html>
                        <head><title>Streaming: ${name}</title><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}</style></head>
                        <body>
                                <iframe src="${source}" frameborder="0" style="width:100%;height:100%;" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                        </body>
                    </html>
                `);
                newWindow.document.close();
            } else {
                alert("Please allow popups to stream.");
            }
        }

        const modal = document.getElementById('watchlist-modal');
        const listDisplay = document.getElementById('watchlist-items');

        function renderWatchlist() {
            listDisplay.innerHTML = myWatchlist.map(itemName => {
                const movie = movieData.find(m => m.name === itemName);
                const posterUrl = movie ? movie.poster : `https://placehold.co/200x300/1e1e24/6366f1?text=${itemName.replace(/ /g, '+')}`;
                const genreLabel = movie ? movie.genre : 'Manual';
       
                
                return `
                    <div class="watchlist-card">
                        <img src="${posterUrl}" alt="${itemName}" onclick="openPlayer('${itemName}')" style="cursor:pointer;">
                        <div class="watchlist-info">
                            <span class="watchlist-category">${genreLabel}</span>
                            <strong>${itemName}</strong>
                            <span class="remove-item" onclick="removeFromWatchlist('${itemName}')">REMOVE</span>
                        </div>
                    </div>
                `;
            }).join('') ||
"<p>Your list is empty</p>";
        }

        document.getElementById('view-watchlist').onclick = () => {
            renderWatchlist();
            modal.style.display = 'block';
        };

        document.getElementById('close-modal').onclick = () => modal.style.display = 'none';
        window.onload = async () => {
            renderAllRows();
            const savedUser = localStorage.getItem('vividUser');
            if(savedUser) document.getElementById('loginBtn').innerText = "User: " + savedUser;
            try {
                await account.getSession('current');
            } catch (err) {
                try {
                    await account.createAnonymousSession();
                } catch (sessionErr) {
                    console.warn("Cloud features limited. Local storage active.");
                }
            }


            try {
                const cloudData = await databases.listDocuments(DB_ID, COL_ID);
                cloudData.documents.forEach(doc => {
                    if (!myWatchlist.includes(doc.movieName)) {
                        myWatchlist.push(doc.movieName);
                    }
                });
                localStorage.setItem('vividWatchlist', JSON.stringify(myWatchlist));
            } catch (e) {
                console.warn("Cloud sync unavailable. Operating in local-only mode.");
            }
            

            renderWatchlist();
            renderRecommendations(); 
        };
    </script>
</body>
</html>
